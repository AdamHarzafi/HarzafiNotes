<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard — Harzafi Notes</title>
    
    <!-- Ottimizzazioni per App Mobile -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    
    <!-- Font e CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="IMMAGINI/HARZAFI-LOGO-FOR-APPLE.png">
</head>
<body>
    
    <!-- NAVBAR CON LOGO IMMAGINE -->
    <nav class="navbar-wrapper glass scrolled" style="display:flex; justify-content:space-between; z-index:100;">
        <img src="IMMAGINI/LOGO-HARZAFI.png" alt="Logo Harzafi" style="height: 36px; object-fit: contain;">
        <div style="display:flex; gap:15px; align-items:center;">
            <button id="btnUploadModal" class="btn-premium" style="display:none; padding:8px 16px;">+ Carica File</button>
            <button id="btnEsci" style="background:none; border:none; font-weight:800; color:var(--danger); cursor:pointer; font-size:1rem;">Esci</button>
        </div>
    </nav>

    <!-- DASHBOARD LAYOUT -->
    <div class="dash-layout" style="margin-top: 100px;">
        <!-- SIDEBAR MATERIE SCORREVOLE SU MOBILE -->
        <aside class="sidebar-materie">
            <h3 style="margin-bottom:20px; font-weight:900; font-size:1.2rem; color:var(--text-dark);">Materie 3°A</h3>
            <button class="materia-btn active" onclick="filtraMateria('Tutte')">Tutti i file</button>
            <button class="materia-btn" onclick="filtraMateria('Informatica')">Informatica <span class="prof-name">Folcarelli, Talomo</span></button>
            <button class="materia-btn" onclick="filtraMateria('Lingua Italiana')">Lingua Italiana <span class="prof-name">Pedio Alessia</span></button>
            <button class="materia-btn" onclick="filtraMateria('Lingua Inglese')">Lingua Inglese <span class="prof-name">Pallone Mariateresa</span></button>
            <button class="materia-btn" onclick="filtraMateria('Sistemi e Reti')">Sistemi e Reti <span class="prof-name">Farese, Sammartino</span></button>
            <button class="materia-btn" onclick="filtraMateria('Storia')">Storia <span class="prof-name">Pedio Alessia</span></button>
            <button class="materia-btn" onclick="filtraMateria('TPSIT')">TPSIT <span class="prof-name">Folcarelli, Maffucci</span></button>
            <button class="materia-btn" onclick="filtraMateria('Telecomunicazioni')">Telecomunicazioni <span class="prof-name">Genetti, Iannacone</span></button>
            <button class="materia-btn" onclick="filtraMateria('Matematica')">Matematica <span class="prof-name">Abramo Rosamaria</span></button>
        </aside>

        <!-- MAIN CONTENT (GRIGLIA APPUNTI) -->
        <main>
            <h2 id="titoloMateria" style="font-weight:900; margin-bottom:30px; font-size:2rem; letter-spacing:-1px;">Tutti i file</h2>
            <div id="notesContainer" class="notes-grid">
                <!-- Qui vengono iniettati gli appunti dal file dashboard.js -->
                <p style="color:var(--text-light); font-weight:700; font-size:1.1rem;">Caricamento appunti dal server...</p>
            </div>
        </main>
    </div>

    <!-- MODALE UPLOAD CON TENDINA PREMIUM -->
    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content">
            <button id="btnChiudiUpload" class="close-btn">×</button>
            <h2 style="font-weight:900; margin-bottom:25px; font-size: 1.6rem; letter-spacing: -0.5px;">Carica nuovo file</h2>
            
            <input type="text" id="upTitolo" class="apple-input" placeholder="Titolo dell'appunto (es. Slide Reti IP)" style="width:100%; margin-bottom:15px;">
            
            <!-- Tendina Estetica (Nuovo Stile) -->
            <div class="custom-select" id="upload-materia-select" style="margin-bottom:20px;">
                <button type="button" class="custom-select-trigger" aria-expanded="false">
                    <span id="upload-materia-display">Informatica</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;color:var(--text-light);"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <div class="custom-options" id="upload-materia-options">
                    <div class="custom-option">Informatica</div>
                    <div class="custom-option">Lingua Italiana</div>
                    <div class="custom-option">Lingua Inglese</div>
                    <div class="custom-option">Sistemi e Reti</div>
                    <div class="custom-option">Storia</div>
                    <div class="custom-option">TPSIT</div>
                    <div class="custom-option">Telecomunicazioni</div>
                    <div class="custom-option">Matematica</div>
                </div>
            </div>

            <div class="file-input-wrapper">
                <input type="file" id="upFile">
                <span class="file-input-text" id="fileNameText">📁 Clicca qui per scegliere un file...</span>
            </div>
            
            <div style="display:flex; gap:15px;">
                <button onclick="document.getElementById('uploadModal').classList.remove('active')" style="flex:1; padding:15px; border-radius:16px; border:none; font-weight:800; cursor:pointer; background:#f1f5f9; color:var(--text-dark); transition:0.3s;">Annulla</button>
                <button id="btnSalva" class="btn-gradient" style="flex:2; border-radius:16px;">Carica nel Cloud</button>
            </div>

            <div id="progressContainer" class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="uploadStatus" style="text-align:center; margin-top:15px; font-weight:800; color:var(--primary); font-size:0.9rem;"></p>
        </div>
    </div>

    <!-- Script Firebase (Compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- MODALE VISUALIZZATORE MEDIA (IMMAGINI E VIDEO) -->
    <div id="mediaViewerModal" class="modal-overlay" style="z-index: 999999; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);">
        <div class="modal-content">
            <!-- Tasto X per chiudere -->
            <button id="btnChiudiViewer" class="close-btn" style="top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); width: 44px; height: 44px; font-size: 24px;">×</button>
            
            <div id="mediaContainer" style="width: 100%; padding: 20px; display: flex; justify-content: center; align-items: center;">
                <!-- Immagine o Video appariranno qui magicamente -->
            </div>
        </div>
    </div>
    
    <!-- Script Logica Dashboard -->
    <script src="dashboard.js"></script>
</body>
</html>
